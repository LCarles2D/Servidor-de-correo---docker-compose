apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-ldap-pv
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-ldap-static
  nfs:
    path: /srv/nfs/ldap
    server: 10.156.23.132
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-ldap-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-ldap-static
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ldap
  labels:
    app: ldap
spec:
  ports:
    - port: 389
      targetPort: 389
      name: ldap
      nodePort: 30389
  selector:
    app: ldap
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ldap
  labels:
    app: ldap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ldap
  template:
    metadata:
      labels:
        app: ldap
    spec:
      containers:
        - name: ldap
          image: lcarles2d/openldap:pdc
          ports:
            - containerPort: 389
              name: ldap
          env:
            - name: LDAP_ROOTPASS
              value: "admin123"
            - name: LDAP_DOMAIN
              value: "frijoli.com"
          volumeMounts:
            - name: ldap-storage
              mountPath: /var/lib/ldap
              subPath: db-data
            - name: ldap-storage
              mountPath: /etc/ldap/slapd.d
              subPath: config-data
      volumes:
        - name: ldap-storage
          persistentVolumeClaim:
            claimName: nfs-ldap-pvc
