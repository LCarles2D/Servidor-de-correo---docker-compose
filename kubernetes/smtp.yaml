apiVersion: v1
kind: Service
metadata:
  name: imap
  labels:
    app: imap
spec:
  type: NodePort
  ports:
    - port: 143
      targetPort: 143
      name: imap
      nodePort: 30143
    - port: 24
      targetPort: 24
      name: lmtp
  selector:
    app: imap
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: imap
  labels:
    app: imap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imap
  template:
    metadata:
      labels:
        app: imap
    spec:
      securityContext:
        fsGroup: 1005
      containers:
        - name: imap
          image: lcarles2d/imap:pdc
          imagePullPolicy: Always
          ports:
            - containerPort: 143
              name: imap
            - containerPort: 24
              name: lmtp
          volumeMounts:
            - name: vmail-storage
              mountPath: /home/vmail
      volumes:
        - name: vmail-storage
          persistentVolumeClaim:
            claimName: nfs-mail-pvc
